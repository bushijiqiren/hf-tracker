# hf-tracker 配置示例。复制为 config.yaml 后按需修改。
# 形如 ${ENV_NAME} 的值会在加载时用环境变量展开（密钥放 .env / 环境变量，别提交）。

# 落盘根目录，AI 分析时固定读 <data_dir>/<source>/latest.json
data_dir: data
reports_dir: reports
conversations_dir: conversations   # 人机对话结构化保存目录，供 AI 检索

# 本地定时任务（hf-tracker schedule，常驻进程）
schedule:
  times: ["09:00", "21:00"]        # 每天这些时间点跑（本地时区，优先）
  # interval_minutes: 360          # 或：每隔多少分钟跑一次（与 times 二选一）
  run_report: false                # 跑完 run 是否接着生成简报（需 DeepSeek key）
  run_at_start: true               # 启动时先立刻跑一次

# AI 模型（默认 DeepSeek，OpenAI 兼容；换 provider 改 base_url + model 即可）
llm:
  base_url: https://api.deepseek.com
  model: deepseek-chat        # 或 deepseek-reasoner（R1，推理更强、更贵）
  api_key: ${DEEPSEEK_API_KEY}
  temperature: 0.7

# 简报生成（hf-tracker report）
report:
  top_n: 15                   # 取评分最高的前几条做综述与草稿
  card_max_chars: 1500        # 每条 model card 摘录的最大字符数

# 多轮讨论（hf-tracker discuss）
discuss:
  context_items: 40           # 载入多少条 digest 作为对话上下文

sources:
  huggingface:
    enabled: true
    # 抓取的实体类型
    kinds: [model, dataset, space]
    # 首次运行 / 无水位线时回看几天（M2 接入 SQLite 水位线后此项作兜底）
    lookback_days: 1
    # 每种类型每次最多拉多少条
    limit_per_kind: 200

  # 后续数据源占位，实现 GitHubSource 后打开即可，核心管道无需改动
  github:
    enabled: false

# 价值评分：score >= threshold 的新条目才推送。
# 新建条目下载/点赞多为 0，所以关键词命中(keyword)与新鲜度(freshness)是主要信号。
# threshold=3 配合 keyword 权重 3 ≈ 至少命中一个关注关键词才推送，避免刷屏。
scoring:
  threshold: 3.0
  freshness_hours: 24      # 新鲜度在多少小时内线性衰减到 0
  weights:
    downloads: 1.0
    likes: 1.0
    trending: 2.0
    freshness: 1.0
    keyword: 3.0           # 每命中一个关键词加的分
  keywords: [llm, agent, multimodal, diffusion, rag, vlm, qwen, llama]
  # 命中任一词的条目直接排除（公开发布场景过滤 NSFW 等）
  blocklist: [not-for-all-audiences, nsfw, porn, hentai, uncensored]

# 推送渠道。密钥用 ${ENV} 从环境变量读，不要写死在文件里。
sinks:
  console:                 # 零配置，直接打印到终端，用于本地验证
    enabled: true
    limit: 10
  telegram:
    enabled: false
    bot_token: ${TELEGRAM_BOT_TOKEN}
    chat_id: ${TELEGRAM_CHAT_ID}
    limit: 10
  email:
    enabled: false
    smtp_host: smtp.qq.com
    smtp_port: 465
    use_ssl: true
    username: ${SMTP_USER}
    password: ${SMTP_PASS}   # QQ 邮箱填「授权码」，非登录密码
    from_addr: ${SMTP_USER}
    to_addrs: [you@example.com]
    limit: 20
  feishu:                  # 飞书/钉钉自定义机器人通用，换 webhook 即可
    enabled: false
    webhook_url: ${FEISHU_WEBHOOK}
    limit: 10
