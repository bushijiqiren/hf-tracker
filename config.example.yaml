# hf-tracker 配置示例。复制为 config.yaml 后按需修改。
# 形如 ${ENV_NAME} 的值会在加载时用环境变量展开（密钥放 .env / 环境变量，别提交）。

# 落盘根目录，AI 分析时固定读 <data_dir>/<source>/latest.json
data_dir: data

sources:
  huggingface:
    enabled: true
    # 抓取的实体类型
    kinds: [model, dataset, space]
    # 首次运行 / 无水位线时回看几天（M2 接入 SQLite 水位线后此项作兜底）
    lookback_days: 1
    # 每种类型每次最多拉多少条
    limit_per_kind: 200

  # 后续数据源占位，实现 GitHubSource 后打开即可，核心管道无需改动
  github:
    enabled: false

# 以下为后续阶段（M2/M3）预留，M1 暂不读取
scoring:
  threshold: 0.0
  weights:
    downloads: 1.0
    likes: 1.0
    freshness: 1.0
    trending: 2.0
  keywords: [llm, agent, multimodal, diffusion]

sinks: {}
