name: track

# 云端定时采集。cron 用 UTC：01:00 / 13:00 UTC ≈ 北京 09:00 / 21:00。
on:
  schedule:
    - cron: "0 1,13 * * *"
  workflow_dispatch: {}        # 也可在 Actions 页手动触发

permissions:
  contents: write              # 允许把数据 commit 回仓库

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      # 去重/水位线状态（data/_state，未提交）跨次运行靠 cache 保留
      - uses: actions/cache@v4
        with:
          path: data/_state
          key: hf-tracker-state-${{ github.run_id }}
          restore-keys: hf-tracker-state-

      - name: 准备配置
        run: cp config.example.yaml config.yaml

      - run: uv sync

      - name: 采集（可选简报）
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: uv run hf-tracker run

      - name: 提交数据归档
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data reports || true
          git diff --staged --quiet || git commit -m "chore: 自动更新数据 $(date -u +%F)"
          git push
